<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">Loading...</title>
    <link rel="preconnect" href="https://www.blogger.com">
    <link rel="preconnect" href="https://blogger.googleusercontent.com">
    <link rel="dns-prefetch" href="https://www.blogger.com">
    <link rel="canonical" id="canonicalUrl" href="">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,-apple-system,sans-serif;max-width:100%;margin:0 auto;padding:70px 8px 20px;background:#0a0a0a;color:#e0e0e0;line-height:1.5}
        .header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111;box-shadow:0 1px 4px rgba(0,0,0,.5);position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:1px solid #222}
        .header-brand{display:flex;align-items:center;gap:10px;min-width:0}
        .header-svg{width:32px;height:32px;flex-shrink:0}
        .header-title{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
        .header-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:none;border:none;cursor:pointer;border-radius:6px;color:#ccc}
        .header-btn:active{background:rgba(255,255,255,.05)}
        .header-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
        .menu{display:none;position:fixed;z-index:99;background:#1a1a1a;border:1px solid #333;padding:12px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
        .menu a{display:block;padding:8px 12px;color:#ccc;text-decoration:none;border-radius:4px;font-size:13px;font-weight:500}
        .menu a:active{background:rgba(255,255,255,.05)}
        .back-link{display:inline-flex;align-items:center;gap:4px;color:#e94560;text-decoration:none;font-size:13px;font-weight:500;margin-bottom:16px}
        .back-link svg{width:16px;height:16px}
        .search-wrap{display:flex;gap:8px;margin-bottom:6px}
        .search-input{flex:1;padding:10px 14px;border:1px solid #333;border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#1a1a1a;color:#fff}
        .search-input:focus{border-color:#e94560}
        .search-input::placeholder{color:#666}
        .search-btn{padding:10px 20px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
        .search-btn:active{background:#c0392b}
        .search-hint{font-size:11px;color:#666;margin-bottom:16px}
        .breadcrumb{margin-bottom:12px;font-size:12px;color:#666}
        .breadcrumb a{color:#888;text-decoration:none}
        .breadcrumb a:hover{color:#e94560}
        .breadcrumb span{color:#e0e0e0;font-weight:600}
        .filter-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1a1a1a;border-radius:8px;margin-bottom:12px;font-size:12px;color:#888}
        .filter-bar a{margin-left:auto;color:#e94560;text-decoration:none;font-weight:600}
        .info-msg{padding:8px 12px;background:#2a1a1a;border:1px solid #e94560;border-radius:8px;margin-bottom:12px;font-size:12px;color:#e0a0a0}
        h1{font-size:20px;margin-bottom:4px;color:#fff}
        .desc{font-size:12px;color:#888;margin-bottom:16px}
        .post-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        @media(min-width:500px){.post-grid{grid-template-columns:repeat(3,1fr)}}
        @media(min-width:768px){body{max-width:900px;padding-left:12px;padding-right:12px}.post-grid{grid-template-columns:repeat(3,1fr);gap:10px}}
        @media(min-width:1024px){body{max-width:1100px}.post-grid{grid-template-columns:repeat(4,1fr);gap:12px}}
        .post-card{background:#111;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:transform 0.2s,box-shadow 0.2s;cursor:pointer}
        .post-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.5)}
        .post-card-img{width:100%;height:auto;display:block;aspect-ratio:2/3;object-fit:cover}
        .post-card-info{display:block;padding:8px 10px;text-decoration:none;color:inherit}
        .post-card-title{font-size:12px;font-weight:600;color:#e0e0e0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .post-card-meta{font-size:10px;color:#888;margin-top:4px}
        .post-card-label{display:inline-block;background:#1a1a1a;padding:1px 6px;border-radius:8px;font-size:9px;color:#999;text-decoration:none;margin-top:4px;cursor:pointer;position:relative;z-index:2}
        .post-card-label:hover{background:#333;color:#fff}
        .pagination{display:flex;justify-content:center;gap:6px;margin-top:20px}
        .pagination a,.pagination span{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;padding:0 8px;border-radius:6px;font-size:13px;text-decoration:none}
        .pagination a{background:#1a1a1a;color:#ccc}
        .pagination a:active{background:#333}
        .pagination .current{background:#e94560;color:#fff;font-weight:700}
        .pagination .disabled{opacity:.3;pointer-events:none;background:#111}
        .loading,.error,.empty{text-align:center;padding:40px 20px;color:#888;font-size:14px}
        .error{color:#e94560}
        footer{margin-top:32px;padding-top:16px;border-top:1px solid #222;text-align:center;font-size:11px;color:#666}
        .count-bar{font-size:11px;color:#666;margin-bottom:12px}

        /* LIGHTBOX */
        .lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:9999;touch-action:pan-x;animation:lbFadeIn 0.2s ease}
        .lightbox.active{display:flex;align-items:center;justify-content:center}
        @keyframes lbFadeIn{from{opacity:0}to{opacity:1}}
        .lightbox-close{position:absolute;top:16px;right:16px;z-index:10;width:40px;height:40px;background:rgba(255,255,255,0.1);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px}
        .lightbox-close:active{background:rgba(255,255,255,0.2)}
        .lightbox-counter{position:absolute;top:16px;left:16px;z-index:10;color:#fff;font-size:13px;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:16px}
        .lightbox-track{display:flex;align-items:center;transition:transform 0.3s ease;height:100%;width:100%;touch-action:pan-x}
        .lightbox-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:60px 16px}
        .lightbox-slide img{max-width:100%;max-height:85vh;object-fit:contain;border-radius:4px;user-select:none;-webkit-user-select:none}
        .lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:44px;height:44px;background:rgba(255,255,255,0.1);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
        .lightbox-prev{left:8px}.lightbox-next{right:8px}
        .lightbox-prev:active,.lightbox-next:active{background:rgba(255,255,255,0.2)}
        .lightbox-caption{position:absolute;bottom:16px;left:16px;right:16px;text-align:center;color:#ccc;font-size:12px;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:8px;line-height:1.3}
        .post-card-img{cursor:pointer}
    </style>
    {% include head.html %}
    {% include verif.html %}
</head>
<body>

    <header class="header">
        <div class="header-brand">
            <svg class="header-svg" viewBox="0 0 100 100" aria-hidden="true">
                <rect x="8" y="8" width="84" height="84" rx="16" fill="#e94560"/>
                <text id="brandSvgText" x="50" y="65" text-anchor="middle" fill="#fff" font-size="40" font-weight="700" font-family="system-ui">A</text>
            </svg>
            <span class="header-title" id="blogTitle"></span>
        </div>
        <button class="header-btn" id="menuToggle" aria-label="Menu">
            <svg id="iconMenu" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            <svg id="iconClose" viewBox="0 0 24 24" style="display:none"><path d="M6 6l12 12M6 18l12-12"/></svg>
        </button>
    </header>

    <nav class="menu" id="menuPanel">
        <a href="/">Home</a>
        <a href="/contact/">Contact</a>
        <a href="/privacy-policy/">Privacy Policy</a>
        <a href="/terms-and-conditions/">Terms &amp; Conditions</a>
    </nav>

    <a class="back-link" id="backLink" style="display:none" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
    </a>

    <div class="breadcrumb" id="breadcrumb"><a href="/">Home</a></div>

    <form class="search-wrap" id="searchForm" action="/" method="get">
        <input class="search-input" type="search" name="label" id="searchInput" placeholder="Search name + leaked..." aria-label="Search">
        <button class="search-btn" type="submit">Search</button>
    </form>
    <p class="search-hint" id="searchHint">Try: name leaked, viral, terbaru</p>

    <h1 id="pageHeading">Loading...</h1>
    <p class="desc" id="siteDesc"></p>
    <div class="filter-bar" id="filterBar" style="display:none"></div>
    <div id="mainContent"><p class="loading">Loading...</p></div>
    <div class="pagination" id="pagination"></div>

    <footer>{% include footer.html %}</footer>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lbClose">&times;</button>
        <span class="lightbox-counter" id="lbCounter"></span>
        <button class="lightbox-prev" id="lbPrev">&lsaquo;</button>
        <button class="lightbox-next" id="lbNext">&rsaquo;</button>
        <div class="lightbox-track" id="lbTrack"></div>
        <div class="lightbox-caption" id="lbCaption"></div>
    </div>

    <script>
    (function(){
        const $=id=>document.getElementById(id);
        const host=location.hostname;
        const parts=host.split('.');
        let dn=parts[0];
        if(parts.length>2&&parts[0]==='www')dn=parts[1];
        dn=dn.replace(/[\.-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        const letters=dn.replace(/[^a-zA-Z0-9]/g,'').toUpperCase().substring(0,3)||'G';
        $('brandSvgText').textContent=letters;
        $('blogTitle').textContent=dn;
        
        const menu=$('menuPanel'),im=$('iconMenu'),ic=$('iconClose');
        let mo=false;
        $('menuToggle').onclick=function(e){
            e.stopPropagation();mo=!mo;
            menu.style.display=mo?'block':'none';
            im.style.display=mo?'none':'';ic.style.display=mo?'':'none';
            if(mo){const r=this.getBoundingClientRect();menu.style.top=(r.bottom+4)+'px';menu.style.right=(innerWidth-r.right)+'px';}
        };
        document.onclick=function(e){if(mo&&!menu.contains(e.target)){mo=false;menu.style.display='none';im.style.display='';ic.style.display='none';}};
        
        // ============================================
        // ⚙️ KONFIGURASI ⚙️
        // ============================================
        const ALL_BLOG_IDS = [
            '3849070220815751744',
            '3744972648234868485',
            '3878198361264397837',
        ];
        const MAX_POSTS_PER_PAGE = 24;
        const DEFAULT_LABEL = '';
        
        function seededShuffle(arr, seed){
            const a = [...arr];
            let s = seed;
            for(let i = a.length - 1; i > 0; i--){
                s = (s * 16807 + 0) % 2147483647;
                const j = s % (i + 1);
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        
        function hashDomain(h){
            let hash = 0;
            for(let i = 0; i < h.length; i++){
                hash = ((hash << 5) - hash) + h.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash);
        }
        
        const seed = hashDomain(host);
        const BLOG_IDS = seededShuffle(ALL_BLOG_IDS, seed);
        
        const p=new URLSearchParams(location.search);
        const POST_SLUG=p.get('p')||'';
        const START=parseInt(p.get('start-index'))||1;
        const MAX=parseInt(p.get('max-results'))||MAX_POSTS_PER_PAGE;
        const LABEL=p.get('label')||DEFAULT_LABEL;
        $('canonicalUrl').href=location.href;
        
        function hd(u){return u&&u.includes('googleusercontent.com')?u.replace(/\/s\d+(-c)?\//,'/s1600/'):u}
        function fd(d){try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}catch(e){return d}}
        function altText(t,c){const p=[t];if(c&&c.length)p.push(c.join(', '));return p.filter(Boolean).join(' - ')}
        
        function il(u){
            if(!u)return'#';
            try{const ur=new URL(u);const slug=ur.pathname.split('/').pop().replace('.html','');return'/?p='+slug;}catch(e){}
            return u;
        }
        
        // ============================================
        // LIGHTBOX
        // ============================================
        let lbImages=[],lbIndex=0;
        const lb=$('lightbox'),lbTrack=$('lbTrack'),lbCounter=$('lbCounter'),lbCaption=$('lbCaption');
        
        function openLightbox(images,index){
            lbImages=images;lbIndex=index;
            renderLightbox();
            lb.classList.add('active');
            document.body.style.overflow='hidden';
        }
        
        function closeLightbox(){
            lb.classList.remove('active');
            document.body.style.overflow='';
            lbImages=[];
        }
        
        function renderLightbox(){
            lbTrack.innerHTML=lbImages.map((img,i)=>{
                const src=hd(img.src)||img.src;
                const alt=img.alt||'Photo '+(i+1);
                return '<div class="lightbox-slide"><img src="'+src+'" alt="'+alt+'"></div>';
            }).join('');
            lbTrack.style.transform='translateX(-'+lbIndex*100+'%)';
            lbCounter.textContent=(lbIndex+1)+' / '+lbImages.length;
            lbCaption.textContent=lbImages[lbIndex]?.alt||'';
        }
        
        function nextImage(){if(lbIndex<lbImages.length-1){lbIndex++;renderLightbox();}}
        function prevImage(){if(lbIndex>0){lbIndex--;renderLightbox();}}
        
        $('lbClose').onclick=closeLightbox;
        $('lbNext').onclick=nextImage;
        $('lbPrev').onclick=prevImage;
        lb.onclick=function(e){if(e.target===lb)closeLightbox();};
        
        document.onkeydown=function(e){
            if(!lb.classList.contains('active'))return;
            if(e.key==='Escape')closeLightbox();
            if(e.key==='ArrowRight')nextImage();
            if(e.key==='ArrowLeft')prevImage();
        };
        
        let touchStartX=0;
        lb.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
        lb.addEventListener('touchend',e=>{
            const diff=touchStartX-e.changedTouches[0].clientX;
            if(Math.abs(diff)>50){if(diff>0)nextImage();else prevImage();}
        });
        
        function attachLightbox(){
            const allImages=document.querySelectorAll('.post-card-img');
            const images=[];
            allImages.forEach(img=>{
                if(img.src&&!img.src.includes('data:image/svg+xml')){
                    const alt=img.getAttribute('data-alt')||img.getAttribute('alt')||'Photo';
                    images.push({src:img.src,alt:alt});
                    img.style.cursor='pointer';
                    const idx=images.length-1;
                    img.onclick=function(e){e.preventDefault();e.stopPropagation();openLightbox(images,idx);};
                }
            });
        }
        
        // ============================================
        // RENDER CARD
        // ============================================
        function renderCard(e){
            const t=e.title?.$t||'Untitled';
            const link=il((e.link||[]).find(l=>l.rel==='alternate')?.href||'#');
            const date=fd(e.published?.$t);
            const content=e.content?.$t||e.summary?.$t||'';
            const thumb=hd(e.media$thumbnail?.url)||(function(c){
                if(!c)return null;
                const d=document.createElement('div');d.innerHTML=c;
                const i=d.querySelector('img');return i?hd(i.src):null;
            })(content);
            const cats=(e.category||[]).map(c=>c.term).filter(Boolean);
            const imgAlt=altText(t,cats).replace(/"/g,'&quot;');
            
            let html='<div class="post-card" onclick="location.href=\''+link+'\'">';
            if(thumb){
                html+='<img class="post-card-img" src="'+thumb+'" alt="'+imgAlt+'" data-alt="'+imgAlt+'" loading="lazy" onerror="this.style.display=\'none\'">';
            }else{
                html+='<div style="aspect-ratio:2/3;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#555;font-size:12px">No Image</div>';
            }
            html+='<div class="post-card-info">';
            html+='<span class="post-card-title">'+t+'</span>';
            if(date)html+='<div class="post-card-meta">'+date+'</div>';
            if(cats.length)html+='<div>'+cats.slice(0,2).map(function(c){return'<span class="post-card-label" onclick="event.stopPropagation();location.href=\'/?label='+c+'\'">'+c+'</span>';}).join('')+'</div>';
            html+='</div></div>';
            return html;
        }
        
        // ============================================
        // MULTI BLOG FETCH
        // ============================================
        function fetchAllBlogs(callback,useLabel,pageStart,pageMax){
            const allPosts=[];
            let completed=0;
            const totalBlogs=BLOG_IDS.length;
            
            if(totalBlogs===0){callback([],0);return;}
            
            BLOG_IDS.forEach(function(bid,idx){
                const base='https://www.blogger.com/feeds/'+bid+'/posts/default';
                const fp=new URLSearchParams();
                fp.set('alt','json-in-script');
                fp.set('callback','mb'+idx);
                fp.set('max-results',pageMax);
                fp.set('start-index',pageStart);
                if(useLabel)fp.set('category',useLabel);
                
                window['mb'+idx]=function(data){
                    const feed=data.feed;
                    if(feed&&feed.entry){
                        const entries=Array.isArray(feed.entry)?feed.entry:[feed.entry];
                        allPosts.push.apply(allPosts,entries);
                    }
                    completed++;
                    if(completed>=totalBlogs){
                        const shuffled=seededShuffle(allPosts,seed+pageStart);
                        callback(shuffled,allPosts.length);
                    }
                };
                
                var s=document.createElement('script');
                s.src=base+'?'+fp.toString();
                s.async=true;
                s.onerror=function(){
                    completed++;
                    if(completed>=totalBlogs){
                        const shuffled=seededShuffle(allPosts,seed+pageStart);
                        callback(shuffled,allPosts.length);
                    }
                };
                document.head.appendChild(s);
            });
        }
        
        // ============================================
        // POST SLUG MODE
        // ============================================
        if(POST_SLUG){
            $('searchForm').style.display='none';
            $('searchHint').style.display='none';
            $('backLink').style.display='inline-flex';
            if(document.referrer&&document.referrer.includes(host))$('backLink').href=document.referrer;
            $('pagination').style.display='none';
            
            const pageId=POST_SLUG.replace(/-/g,' ');
            document.title=pageId+' Leaked Photos & Viral Updates — '+dn;
            $('pageHeading').textContent=pageId;
            $('siteDesc').textContent='View latest '+pageId+' leaked photos, viral content, and exclusive updates on '+dn+'.';
            
            var md=document.createElement('meta');md.name='description';md.content='View latest '+pageId+' leaked photos, viral content, and exclusive updates on '+dn+'. Browse the full collection.';document.head.appendChild(md);
            $('breadcrumb').innerHTML='<a href="/">Home</a> &rsaquo; <span>'+pageId+'</span>';
            
            const rs=Math.floor(Math.random()*20)+1;
            fetchAllBlogs(function(posts){
                const container=$('mainContent');
                if(!posts.length){container.innerHTML='<p class="empty">No posts found.</p>';return;}
                const display=posts.slice(0,10);
                let html='<p class="count-bar">Showing 10 random leaked photos from '+BLOG_IDS.length+' sources</p><div class="post-grid">';
                for(let i=0;i<display.length;i++){html+=renderCard(display[i]);}
                html+='</div>';container.innerHTML=html;
                attachLightbox();
            },'',rs,4);
            return;
        }
        
        // ============================================
        // GRID MODE
        // ============================================
        const si=$('searchInput');if(si&&LABEL)si.value=LABEL;
        if(LABEL)$('searchHint').textContent='Showing results for: '+LABEL;
        else $('searchHint').textContent='Try: name leaked, viral, terbaru, exclusive';
        
        if(LABEL){
            const il=/leak|viral|terbaru|exclusive|hot|terkini/i.test(LABEL);
            let pt,pd;
            if(il){pt=LABEL+' — '+dn;pd='View '+LABEL+' leaked photos, viral content, and exclusive updates on '+dn+'.';}
            else{pt=LABEL+' Leaked Photos & Viral Updates — '+dn;pd='View latest '+LABEL+' leaked photos, viral content, and exclusive updates on '+dn+'. Browse the full collection.';}
            document.title=pt;$('pageHeading').textContent=LABEL;$('siteDesc').textContent=pd;
            var md=document.createElement('meta');md.name='description';md.content=pd;document.head.appendChild(md);
            $('filterBar').style.display='flex';$('filterBar').innerHTML='Category: <strong>'+LABEL+'</strong> <a href="/">Clear</a>';
            $('breadcrumb').innerHTML='<a href="/">Home</a> &rsaquo; <span>'+LABEL+'</span>';
        }else{
            document.title=dn+' — Leaked Photos & Viral Collection';
            $('pageHeading').textContent=dn;$('siteDesc').textContent='Latest leaked photos, viral content, and exclusive updates. Browse the full collection.';
            var md=document.createElement('meta');md.name='description';md.content='Latest leaked photos, viral content, and exclusive updates on '+dn+'. New photos added regularly.';document.head.appendChild(md);
        }
        
        const perBlog=Math.ceil(MAX/BLOG_IDS.length);
        fetchAllBlogs(function(posts){
            const container=$('mainContent');
            if(!posts.length){container.innerHTML='<p class="empty">No posts found.</p>';return;}
            const display=posts.slice(0,MAX);
            let html='<p class="count-bar">Showing '+display.length+' leaked photos from '+BLOG_IDS.length+' sources</p><div class="post-grid">';
            for(let i=0;i<display.length;i++){html+=renderCard(display[i]);}
            html+='</div>';container.innerHTML=html;
            attachLightbox();
            $('pagination').innerHTML='';
        },LABEL,START,perBlog);
    })();
    </script>
</body>
</html>
